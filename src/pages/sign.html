<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STUDEO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style/style.css" />
    <script>
      if (sessionStorage.getItem('loggedInUser')) {
        alert('로그인 상태입니다.')
        setTimeout(() => {
          location.href = '/index.html'
        }, 100)
      }
    </script>
  </head>

  <body>
    <header>
      <div class="header-left">
        <a href="/index.html" class="logo">
          <span
            style="
              background: linear-gradient(135deg, #614e9c, #7476d4);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
            "
            >🛡️</span
          ><span style="font-style: italic">STUDEO</span>
        </a>

        <ul class="nav-links">
          <li><a href="/src/pages/learn.html">학습</a></li>
          <li><a href="/src/pages/quiz/quizzes.html">퀴즈</a></li>
          <li><a href="/src/pages/community.html">게시판</a></li>
        </ul>
      </div>

      <div class="header-right">
        <div class="login"><a href="/src/pages/login.html">로그인</a></div>
        <a href="/src/pages/team.html" class="team-link">팀 소개</a>
      </div>
    </header>

    <div class="container">
        <div class="login-container">
          <h1>회원가입</h1>
          <input type="text" id="signup-id" class="input" placeholder="아이디" />
          <div class="password-field">
            <input type="password" id="signup-pw" class="input" placeholder="비밀번호" />
            <button type="button" id="toggle-signup-pw" class="password-toggle" aria-label="비밀번호 토글"></button>
          </div>
          <button class="login-button" onclick="signUp()">회원가입</button>
          <p>이미 계정이 있으신가요? <a href="login.html" id="sign-link">로그인</a></p>
        </div>
      </div>
    </div>
    <footer>© 김정현진과 유청림성준. All rights reserved.</footer>
    <script src="../script/main.js"></script>
  </body>
</html>
