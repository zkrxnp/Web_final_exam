<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STUDEO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style/style.css" />
    <link rel="stylesheet" href="../style/community.css" />
  </head>

  <!-- 헤더 -->
  <body class="community">
    <header>
      <div class="header-left">
        <a href="/index.html" class="logo">
          <span
            style="
              background: linear-gradient(135deg, #614e9c, #7476d4);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
            "
            >🛡️</span
          ><span style="font-style: italic">STUDEO</span>
        </a>

        <ul class="nav-links">
          <li><a href="/src/pages/learn.html">학습</a></li>
          <li><a href="/src/pages/quiz/quizzes.html">퀴즈</a></li>
          <li class="active"><a href="/src/pages/community.html">게시판</a></li>
          <li class="member-only">
            <a href="/src/pages/mistake.html">오답 노트</a>
          </li>
        </ul>
      </div>

      <div class="header-right">
        <div class="login"><a href="/src/pages/login.html">로그인</a></div>
        <a href="/src/pages/mypage.html" class="mypage-link member-only">
          <img src="/assets/mypage-icon.png" alt="프로필 이미지" />
        </a>
        <a href="/src/pages/team.html" class="team-link">팀 소개</a>
      </div>
    </header>

    <!-- 사이드 바 -->
    <div class="container">
      <aside class="sidebar">
        <div class="nav-menu-box">
          <div class="nav-item active" onclick="sw('notice', this)">
            발전사항
          </div>
          <div class="nav-item" onclick="sw('contact', this)">공유 게시판</div>
          <div class="nav-item" onclick="sw('qna', this)">질문 게시판</div>
        </div>
      </aside>
      <main class="main" id="main-area"></main>
    </div>

    <!-- 글 작성 부분 -->
    <div class="modal-overlay" id="write-modal">
      <div class="modal">
        <div class="modal-title" id="modal-title">글 작성</div>
        <div class="form-row">
          <label>제목</label>
          <input type="text" id="form-title" placeholder="제목을 입력하세요" />
        </div>
        <div class="form-row">
          <label>내용</label>
          <textarea
            id="form-body"
            placeholder="내용을 입력하세요"
            rows="6"
          ></textarea>
        </div>

        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn btn-primary" onclick="submitPost()">등록</button>
        </div>
      </div>
    </div>

    <footer>© 김정현진과 유청림성준. All rights reserved.</footer>
    <script src="/src/script/main.js"></script>
    <script src="../script/community.js"></script>
  </body>
</html>
