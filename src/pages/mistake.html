<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STUDEO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style/style.css" />
    <link rel="stylesheet" href="/src/style/mistake.css" />
    <script>
      // 로그인 상태가 아니면 즉시 로그인 페이지로 이동 (깜빡임 방지)
      if (!sessionStorage.getItem('loggedInUser')) {
        alert('로그인 후 이용 가능한 페이지입니다.')
        setTimeout(() => {
          location.href = './login.html'
        }, 100)
      }
    </script>
  </head>

  <body>
    <header>
      <div class="header-left">
        <a href="/index.html" class="logo">
          <span
            style="
              background: linear-gradient(135deg, #614e9c, #7476d4);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
            "
            >🛡️</span
          ><span style="font-style: italic">STUDEO</span>
        </a>
        <ul class="nav-links">
          <li><a href="/src/pages/learn.html">학습</a></li>
          <li><a href="/src/pages/quiz/quizzes.html">퀴즈</a></li>
          <li><a href="/src/pages/community.html">게시판</a></li>
          <li class="member-only active">
            <a href="/src/pages/mistake.html">오답 노트</a>
          </li>
        </ul>
      </div>

      <div class="header-right">
        <a href="/src/pages/mypage.html" class="mypage-link member-only">
          <img src="/assets/mypage-icon.png" alt="프로필 이미지" />
        </a>
        <a href="/src/pages/team.html" class="team-link">팀 소개</a>
      </div>
    </header>
    <div class="container">
      <div class="mistake-container">
        <div class="top-tittle">
          <button
            type="button"
            id="btn-back"
            class="btn-back"
            aria-label="이전 페이지로 이동"
          >
            <div class="icon-back"></div>
          </button>
          <h1>오답노트</h1>
        </div>
        <div class="btn-center">
          <button class="primary" onclick="startTip()">작성 TIP</button>
        </div>

        <div class="card">
          <h3>오답 입력</h3>
          <textarea id="question" placeholder="문제"></textarea>
          <input id="correct" placeholder="정답" />
          <input id="myAnswer" placeholder="내 답" />

          <select id="type">
            <option>선택안함</option>
            <option>유형1 - 이해 못함</option>
            <option>유형2 - 중간 막힘</option>
            <option>유형3 - 개념 부족</option>
            <option>유형4 - 풀이 오류</option>
            <option>유형5 - 단순 실수</option>
          </select>

          <textarea id="analysis" placeholder="분석"></textarea>

          <button class="primary" onclick="addNote()">추가</button>
        </div>

        <div id="noteList"></div>
      </div>

      <!-- ✅ 모달 -->
      <div id="tipModal" class="modal">
        <div class="modal-content">
          <h2>시험 대비 작성 TIP</h2>
          <p id="tipText"></p>

          <div class="modal-buttons">
            <button onclick="prevTip()">이전</button>
            <button onclick="nextTip()">다음</button>
            <button onclick="closeTip()">닫기</button>
          </div>
        </div>
      </div>
    </div>
    <footer>© 김정현진과 유청림성준. All rights reserved.</footer>
    <script src="/src/script/main.js"></script>
    <script src="/src/script/mistake.js"></script>
  </body>
</html>
